<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ASCII-CAM</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="screen">
    <canvas id="display"></canvas>
    <div id="scanlines"></div>
  </div>

  <div id="panel" class="hidden">
    <div class="row">
      <label for="cols">RESOLUTION</label>
      <input type="range" id="cols" min="40" max="150" value="150" step="5">
      <span id="colsVal">150</span>
    </div>
    <div class="row">
      <label for="contrast">CONTRAST</label>
      <input type="range" id="contrast" min="50" max="200" value="160" step="5">
      <span id="contrastVal">160</span>
    </div>
    <div class="row">
      <label><input type="checkbox" id="invert"> INVERT</label>
      <label><input type="checkbox" id="dither" checked> DITHER</label>
    </div>
    <div id="status">STATUS: WAITING FOR CAMERA PERMISSION</div>
  </div>

  <div id="bottomBar">
    <button id="btnPanel" aria-label="toggle controls">[ MENU ]</button>
    <button id="btnFlip">FLIP CAM</button>
    <button id="btnFreeze">FREEZE</button>
    <button id="btnStyle">STYLE 1</button>
    <button id="btnPhoto" aria-label="take photo">[ PHOTO ]</button>
    <button id="btnRecord" aria-label="record video">[ REC ]</button>
  </div>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="sample"></canvas>

  <script src="app.js"></script>
</body>
</html>
